name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Build, tag and publish the APK as a GitHub Release
  # ─────────────────────────────────────────────────────────────
  release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      skipped: ${{ steps.check_tag.outputs.skipped }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check whether tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        if: steps.check_tag.outputs.skipped == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        if: steps.check_tag.outputs.skipped == 'false'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.check_tag.outputs.skipped == 'false'
        run: flutter pub get

      - name: Analyze
        if: steps.check_tag.outputs.skipped == 'false'
        run: dart analyze lib/

      - name: Run tests
        if: steps.check_tag.outputs.skipped == 'false'
        run: flutter test

      - name: Build APK (debug signing)
        if: steps.check_tag.outputs.skipped == 'false'
        run: flutter build apk --release

      - name: Create and push git tag
        if: steps.check_tag.outputs.skipped == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        if: steps.check_tag.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Torrent Player v${{ steps.version.outputs.version }}
          body: |
            ## What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/master) for details.

            ## Download
            Install the APK directly — no Play Store needed.
          files: build/app/outputs/flutter-apk/app-release.apk

  # ─────────────────────────────────────────────────────────────
  # Job 2: Take automated screenshots (phone + tablet)
  # ─────────────────────────────────────────────────────────────
  screenshots:
    name: Automated Screenshots
    needs: release
    if: needs.release.outputs.skipped == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: phone
            avd_name: pixel_5
            hw_profile: pixel_5
          - profile: tablet
            avd_name: pixel_tablet
            hw_profile: pixel_tablet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable KVM (faster emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests + capture screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: ${{ matrix.hw_profile }}
          avd-name: ${{ matrix.avd_name }}
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            flutter drive --driver=test_driver/integration_test.dart --target=integration_test/screenshot_test.dart -d emulator-5554
            adb shell mkdir -p /sdcard/Pictures/screenshots || true
            mkdir -p screenshots/${{ matrix.profile }}
            adb pull /sdcard/Pictures/screenshots/ screenshots/${{ matrix.profile }}/ || true
            ls -la screenshots/${{ matrix.profile }}/

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.profile }}
          path: screenshots/${{ matrix.profile }}/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 3: Commit screenshots back to master
  # ─────────────────────────────────────────────────────────────
  commit-screenshots:
    name: Commit screenshots to repo
    needs: [release, screenshots]
    if: needs.release.outputs.skipped == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download phone screenshots
        uses: actions/download-artifact@v4
        with:
          name: screenshots-phone
          path: screenshots/phone/

      - name: Download tablet screenshots
        uses: actions/download-artifact@v4
        with:
          name: screenshots-tablet
          path: screenshots/tablet/

      - name: Commit and push screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "chore: update screenshots [skip ci]"
            git push origin master
          fi
