name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Build, tag and publish the APK as a GitHub Release
  # ─────────────────────────────────────────────────────────────
  release:
    name: Build APK & Publish Release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      skipped: ${{ steps.check_tag.outputs.skipped }}


    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check whether tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists — skipping release."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        if: steps.check_tag.outputs.skipped == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter
        if: steps.check_tag.outputs.skipped == 'false'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.check_tag.outputs.skipped == 'false'
        run: flutter pub get

      - name: Analyze
        if: steps.check_tag.outputs.skipped == 'false'
        run: dart analyze lib/

      - name: Run tests
        if: steps.check_tag.outputs.skipped == 'false'
        run: flutter test

      - name: Build APK (debug signing)
        if: steps.check_tag.outputs.skipped == 'false'
        run: flutter build apk --release

      - name: Create and push git tag
        if: steps.check_tag.outputs.skipped == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        if: steps.check_tag.outputs.skipped == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Torrent Player v${{ steps.version.outputs.version }}
          body: |
            ## What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/master) for details.

            ## Download
            Install the APK directly — no Play Store needed.
          files: build/app/outputs/flutter-apk/app-release.apk
